                        ctx.strokeStyle = "#166534";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, Math.max(3, e.radius), 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                }
            }
            // drawn on top of the maze; backward walk so splicing expired effects is safe
            function drawEffects() {
                for (let i = effects.length - 1; i >= 0; i--) {
                    const e = effects[i];
                    const local = now - e.t0 - (e.delay || 0);
                    if (local < 0) continue; // staggered start not reached yet
                    drawEffect(e, Math.min(1, local / e.dur));
                    if (local >= e.dur) effects.splice(i, 1);
                }
            }

            /* filter (visualization) transition wave ----------------------------------- */
            /* On a filter change we BFS-label every site with its hop-distance from the
   player, then advance a front of WAVE_SPEED hops per frame. A site the front
   has passed renders under the NEW mode; the rest stay on the OLD one, so the
   recolour sweeps out along the maze from the character. currentModeK(k) is the
   single hook the draw loop consults; with no active wave it just returns
   vizMode, so the renderer is unchanged in the common case. */
            const WAVE_SPEED = 5; // hops the colour front advances per frame
            let waveActive = false,
                wavePrev = null,
                waveFront = 0,
                waveMax = 0;
            const waveDist = new Map(); // key -> hop distance from player at switch
            function setViz(mode) {
                if (mode === vizMode) {
                    return;
                }
                wavePrev = vizMode;
                vizMode = mode;
                waveDist.clear();
                waveMax = 0;
                waveActive = false;
                waveFront = 0;
                if (player != null && S(player)) {
                    waveDist.set(player, 0);
                    const q = [player];
                    let qi = 0;
                    while (qi < q.length) {
                        const k = q[qi++],
                            d = waveDist.get(k);
                        for (const nk of passKeys(k)) {
                            if (!waveDist.has(nk)) {
                                waveDist.set(nk, d + 1);
                                if (d + 1 > waveMax) waveMax = d + 1;
                                q.push(nk);
                            }
                        }
                    }
                    waveActive = true;
                } else {
                    wavePrev = null;
                } // no player yet: switch instantly
            }
            function advanceWave() {
                if (!waveActive) return;
                waveFront += WAVE_SPEED;
                if (waveFront > waveMax) {
                    waveActive = false;
                    wavePrev = null;
                    waveDist.clear();
                }
            }
            function currentModeK(k) {
                if (!waveActive) return vizMode;
                const d = waveDist.get(k);
                if (d == null) return vizMode; // unreached -> show the new mode
                return d <= waveFront ? vizMode : wavePrev;
            }

            /* xp / skill-point mutators ------------------------------------------------ */
            /* All xp gains route through addXP so a freshly earned skill point can fire a
   shockwave on the xp bar exactly once. */
            function addXP(n) {
                if (!n) return;
                const before = availablePoints();
                totalXP += n;
                const after = availablePoints();
                if (after > before) onPointsGained(after - before);
                updateSkillButton();
            }
            function onPointsGained(count) {
                const rings = Math.min(count, 4);
                for (let i = 0; i < rings; i++)
                    addEffect({
                        kind: "shock",
                        target: "xpBar",
                        delay: i * 130,
                        dur: 680,
                    });
            }
            function skillBtnLabel() {
                const n = availablePoints();
                return n > 0 ? "Skills (" + n + ")" : "Skills";
            }
            function updateSkillButton() {
                const b = document.getElementById("skillsBtn");
                if (b) b.textContent = skillBtnLabel();
            }

            /* [SEC:draw] ----------------------------------------------- camera + draw */
            const cv = document.getElementById("c"),
                ctx = cv.getContext("2d");
            let DPR = 1,
                Wd = 0,
                Hd = 0;
            let cam = { x: 0, y: 0, scale: 26 };
            function baseScale() {
                return Math.max(16, Math.min(Wd, Hd) / (16 * L.spacing));
            }
            function resize() {
                DPR = Math.min(2, window.devicePixelRatio || 1);
                Wd = window.innerWidth;
                Hd = window.innerHeight;
                cv.width = Wd * DPR;
                cv.height = Hd * DPR;
                cv.style.width = Wd + "px";
                cv.style.height = Hd + "px";
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            }
            window.addEventListener("resize", resize);

            function worldToScreen(p) {
                return {
                    x: (p.x - cam.x) * cam.scale + Wd / 2,
                    y: (p.y - cam.y) * cam.scale + Hd / 2,
                };
            }
            function screenToWorld(sx, sy) {
                return {
                    x: (sx - Wd / 2) / cam.scale + cam.x,
                    y: (sy - Hd / 2) / cam.scale + cam.y,
                };
            }

            const WHITE = "#e7edf1";
            const BLACK = "#000000";
            const PURPLEGREY = "#857a90";
            const SANDYTAN = "#c9ae7b";
            const GRASSGREEN = "#6fa66a";
            const GRANTBLUE = "#5a83d6";
            const LAVARED = "#ff584a";
            function wheel(d, sat, lum) {
                const h = (d * 1.8) % 360;
                return `hsl(${h},${sat}%,${lum}%)`;
            } // 200 sites / full cycle
            // End vision: colour by the same 200-site-cycle wheel as the depth modes, but
            // only out to a max depth of the Exploration skill; anything deeper is white.
            function endColour(d) {
                const maxD = skills.explore.level;
                if (d == null || d > maxD) return WHITE;
                return wheel(d, 68, 56);
            }
            function effDepth(s) {
                return s.depth != null
                    ? s.depth
                    : s.prov != null
                      ? s.prov
                      : null;
            }
            function siteStateColour(s) {
                if (s.claimed) return GRASSGREEN;
                if (s.kindled) return SANDYTAN;
                if (s.granted) return GRANTBLUE;
                if (s.scorched) return LAVARED;
                return PURPLEGREY;
            }
            function siteStateRank(s) {
                if (s.claimed) return 0;
                if (s.granted) return 1;
                if (s.kindled) return 2;
                if (s.scorched) return 3;
                return 4;
            }
            // colour for a site record under a given visualization mode (defaults to vizMode)
            function siteColour(s, mode) {
                mode = mode || vizMode;
                switch (mode) {
                    case "endVision":
                        return s.depth != null ? endColour(s.depth) : WHITE;
                    case "distance":
                        return s.reachEx ? wheel(s.dist, 68, 56) : WHITE; // only revealed paths get colour
                    case "claimed":
                    case "default":
                        return siteStateColour(s);
                    default:
                        return siteStateColour(s);
                }
            }
            // per-mode "rank" so a corridor takes the colour of its more-relevant endpoint
            function rank(s, mode) {
                mode = mode || vizMode;
                switch (mode) {
                    case "endVision": {
                        const d = effDepth(s);
                        return d == null ? Infinity : d;
                    }
                    case "distance":
                        return s.reachEx ? s.dist : Infinity;
                    case "claimed":
                    case "default":
                        return siteStateRank(s);
                    default:
                        return siteStateRank(s);
                }
            }
            // a site is visible (drawn) in a given mode (defaults to vizMode)
            function visSite(s, mode) {
                mode = mode || vizMode;
                if (!s.mapped) return false;
                if (mode === "claimed")
                    return (
                        isSiteShown(s) || s.claimed || s.kindled || s.scorched
                    );
                return isSiteShown(s); // revealed only
            }

            function draw() {
                now = performance.now();
                advanceWave(); // step the filter-transition front
                ctx.clearRect(0, 0, Wd, Hd);
                // background
                ctx.fillStyle = "#0c1014";
                ctx.fillRect(0, 0, Wd, Hd);

                const sc = cam.scale;
                const cellR = Math.max(1.5, sc * 0.3);
                const passW = Math.max(3, sc * 0.6);

                // visible-world bounds (cull)
                const tl = screenToWorld(0, 0),
                    br = screenToWorld(Wd, Hd);
                const pad = 2;
                const minX = tl.x - pad,
                    maxX = br.x + pad,
                    minY = tl.y - pad,
                    maxY = br.y + pad;

                // pass 1: corridors. A visible endpoint can draw to a hidden passage-neighbour,
                // treating that hidden endpoint as black. Each corridor holds one endpoint's
                // colour for one site-radius, blends linearly across the middle span, then
                // holds the other endpoint's colour for the final site-radius.
                ctx.lineCap = "round";
                const drawnEdges = new Set();
                for (const [k, s] of sites) {
                    const ms = currentModeK(k);
                    if (!visSite(s, ms)) continue;
                    const a = L.toPixel(s.c);
                    if (a.x < minX || a.x > maxX || a.y < minY || a.y > maxY)
                        continue;
                    const sa = worldToScreen(a);
                    for (const nk of s.pass) {
                        const edgeKey = nk < k ? nk + "|" + k : k + "|" + nk;
                        if (drawnEdges.has(edgeKey)) continue;
                        drawnEdges.add(edgeKey);
                        const ns = sites.get(nk);
                        if (!ns || !ns.mapped) continue;
                        const mn = currentModeK(nk);
                        const b = L.toPixel(ns.c);
                        const sb = worldToScreen(b);
                        const otherVisible = visSite(ns, mn);
                        const colorA = siteColour(s, ms);
                        const colorB = otherVisible ? siteColour(ns, mn) : BLACK;
                        const dx = sb.x - sa.x;
                        const dy = sb.y - sa.y;
                        const len = Math.hypot(dx, dy);
                        if (len <= 0) continue;
                        const hold = Math.min(cellR, len / 2);
                        const holdFrac = hold / len;
                        const blendStart = holdFrac;
                        const blendEnd = 1 - holdFrac;
                        const grad = ctx.createLinearGradient(sa.x, sa.y, sb.x, sb.y);
                        grad.addColorStop(0, colorA);
                        grad.addColorStop(blendStart, colorA);
                        grad.addColorStop(blendEnd, colorB);
                        grad.addColorStop(1, colorB);
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = passW;
                        ctx.beginPath();
                        ctx.moveTo(sa.x, sa.y);
                        ctx.lineTo(sb.x, sb.y);
                        ctx.stroke();
                    }
                }
                // pass 2: cells
                for (const [k, s] of sites) {
                    const m = currentModeK(k);
                    if (!visSite(s, m)) continue;
                    const a = L.toPixel(s.c);
                    if (a.x < minX || a.x > maxX || a.y < minY || a.y > maxY)
                        continue;
                    const sa = worldToScreen(a);
                    ctx.fillStyle = siteColour(s, m);
                    ctx.beginPath();
                    ctx.arc(sa.x, sa.y, cellR, 0, 7);
                    ctx.fill();
                    if (showDbg && sc > 16) {
                        const v = s.depth != null ? s.depth : s.prov;
                        if (v != null) {
                            ctx.fillStyle = "#0a0e12";
                            ctx.font = `${Math.min(11, sc * 0.4)}px ui-monospace,monospace`;
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            ctx.fillText(v, sa.x, sa.y);
                        }
                    }
                }

                // cooling crystals: icy-blue diamonds on visible sites
                for (const [k, s] of sites) {
                    const m = currentModeK(k);
                    if (!s.crystal || !visSite(s, m)) continue;
                    const a = L.toPixel(s.c);
                    if (a.x < minX || a.x > maxX || a.y < minY || a.y > maxY)
                        continue;
                    const p = worldToScreen(a);
                    const r = Math.max(2.5, cellR * 1.25);
                    ctx.fillStyle = "#b9f2ff";
                    ctx.strokeStyle = "#4a90b8";
                    ctx.lineWidth = Math.max(1, sc * 0.03);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y - r);
                    ctx.lineTo(p.x + r, p.y);
                    ctx.lineTo(p.x, p.y + r);
                    ctx.lineTo(p.x - r, p.y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                // planned route highlight
                if (pathPlan && pathPlan.length) {
                    ctx.strokeStyle = "#ffd23f";
                    ctx.lineWidth = Math.max(2, sc * 0.16);
                    ctx.globalAlpha = 0.95;
                    ctx.beginPath();
                    for (let i = 0; i < pathPlan.length; i++) {
                        const p = worldToScreen(L.toPixel(S(pathPlan[i]).c));
                        if (i === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    const tgt = worldToScreen(
                        L.toPixel(S(pathPlan[pathPlan.length - 1]).c),
                    );
                    ctx.fillStyle = "#ffd23f";
                    ctx.beginPath();
                    ctx.arc(tgt.x, tgt.y, Math.max(3, sc * 0.16), 0, 7);
                    ctx.fill();
                }

                // star target
                if (starKey) {
                    const ss = S(starKey);
                    if (ss && ss.mapped) {
                        const p = worldToScreen(L.toPixel(ss.c));
                        const outer = Math.max(7, sc * 0.34);
                        const inner = outer * 0.48;
                        const spin = now * 0.004;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(spin);
                        ctx.fillStyle = "#ffd84d";
                        ctx.strokeStyle = "#8a6500";
                        ctx.lineWidth = Math.max(1.2, sc * 0.04);
                        ctx.beginPath();
                        for (let i = 0; i < 10; i++) {
                            const ang = -Math.PI / 2 + i * (Math.PI / 5);
                            const rad = i % 2 === 0 ? outer : inner;
                            const x = Math.cos(ang) * rad;
                            const y = Math.sin(ang) * rad;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                    }
                }

                // player marker
                const pp = worldToScreen(playerPixel());
                ctx.fillStyle = "#0c1014";
                ctx.beginPath();
                ctx.arc(pp.x, pp.y, Math.max(7, sc * 0.34), 0, 7);
                ctx.fill();
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(pp.x, pp.y, Math.max(5, sc * 0.24), 0, 7);
                ctx.fill();
                ctx.strokeStyle = "#0c1014";
                ctx.lineWidth = 2;
                ctx.stroke();

                drawEffects(); // transient one-off visuals, on top

                requestAnimationFrame(draw);
            }

            /* [SEC:player-pos] -------------------------------------------- player pos */
            let playerAnim = null; // {from:{x,y},to,t0,dur}
            function playerPixel() {
                const base = L.toPixel(S(player).c);
                if (playerAnim) {
                    const t = Math.min(
                        1,
                        (performance.now() - playerAnim.t0) / playerAnim.dur,
                    );
                    return {
                        x: playerAnim.from.x + (base.x - playerAnim.from.x) * t,
                        y: playerAnim.from.y + (base.y - playerAnim.from.y) * t,
                    };
                }
                return base;
            }

            /* [SEC:pathfinding] ------------------------------------------ pathfinding */
            /* Climb the depth tree from both ends to their meeting point. Parent = the
   passage neighbour with strictly greater effective height (resolved depth, or
   provisional where there is no resolved depth). BFS is the safety net. */
            function H(k) {
                const s = S(k);
                return s.depth != null
                    ? s.depth
                    : s.prov != null
                      ? s.prov
                      : null;
            }
            function parentOf(k) {
                const hk = H(k);
                let best = null,
                    bh = -Infinity;
                for (const nk of passKeys(k)) {
                    const h = H(nk);
                    if (h == null) continue;
                    if (hk == null) {
                        if (h > bh) {
                            bh = h;
                            best = nk;
                        }
                    } else if (h > hk && h > bh) {
                        bh = h;
                        best = nk;
                    }
                }
                return best;
            }
            function findPath(a, b) {
                if (a === b) return [a];
                // try depth-climb LCA
                const upA = [a],
                    setA = new Map([[a, 0]]);
                let cur = a,
                    steps = 0;
                while (true) {
                    const p = parentOf(cur);
                    if (p == null || setA.has(p) || steps++ > 100000) break;
                    setA.set(p, upA.length);
                    upA.push(p);
                    cur = p;
                }
                const upB = [b];
                cur = b;
                steps = 0;
                while (true) {
                    if (setA.has(cur)) {
                        const ai = setA.get(cur);
                        const left = upA.slice(0, ai + 1); // a → meet
                        const right = upB.slice(0, -1).reverse(); // (b → meet) reversed, drop meet
                        return left.concat(right);
                    }
                    const p = parentOf(cur);
                    if (p == null || steps++ > 100000) break;
                    upB.push(p);
                    cur = p;
                }
                // fallback: BFS on the tree (unique path guaranteed)
                return bfsPath(a, b);
            }
            function bfsPath(a, b) {
                const prev = new Map([[a, null]]);
                const q = [a];
                while (q.length) {
                    const k = q.shift();
                    if (k === b) {
                        const path = [];
                        let t = b;
                        while (t != null) {
                            path.push(t);
                            t = prev.get(t);
                        }
                        return path.reverse();
                    }
                    for (const nk of passKeys(k))
                        if (!prev.has(nk)) {
                            prev.set(nk, k);
                            q.push(nk);
                        }
                }
                return null;
            }

            /* [SEC:nearest-site] ---------------------------------------- nearest site */
            /* nearest *traversable* (revealed / in-patch) site the finger is over, within a
   snap radius — hidden sites can't be traversed, so they aren't targetable */
            function siteUnderFinger(wx, wy) {
                const guess = L.fromPixel(wx, wy);
                const cand = [guess, ...L.neighbors(guess)];
                let best = null,
                    bd = Infinity;
                for (const c of cand) {
                    const k = L.key(c);
                    const s = sites.get(k);
                    if (!s || !s.mapped || !isSiteShown(s)) continue;
                    const p = L.toPixel(c);
                    const d = (p.x - wx) ** 2 + (p.y - wy) ** 2;
                    if (d < bd) {
                        bd = d;
                        best = k;
                    }
                }
                const snap = (0.62 * L.spacing) ** 2;
                return best && bd <= snap ? best : null;
            }

            /* [SEC:movement] ------------------------------------------------ movement */
            let moveQueue = null,
                moving = false,
                banished = false; // set by banish(); stepMove aborts current step when true
            function setStop(on) {
                const sb = document.getElementById("stopBtn"),
                    hint = document.getElementById("hint");
                sb.style.display = on ? "block" : "none";
                hint.style.display = on ? "none" : "block";
            }
            function stopMove() {
                // halt at the current site, abandon the rest of the route
                moveQueue = null;
                pathPlan = null;
                moving = false;
                setStop(false);
            }
            function walkPath(path) {
                if (!path || path.length < 2) return;
                moveQueue = path.slice(1); // first element is current player
                setStop(true);
                if (!moving) stepMove();
            }
            function resolveLandingSite(k) {
                const s = S(k);
                if (!s || s.granted) return;
                if (isOnStarPath(k)) {
                    if (!s.kindled) gainHeat(1);
                    kindleSite(k);
                    return;
                }
                if (s.scorched) {
                    gainHeat(1);
                    return;
                }
                s.kindled = false;
                s.scorched = true;
                const wp = L.toPixel(s.c);
                addEffect({
                    kind: "sitePulse",
                    world: { x: wp.x, y: wp.y },
                    color: LAVARED,
                    dur: 460,
                });
                gainHeat(4);
            }
            function unlockSteppedGrant(k) {
                if (isOnStarPath(k) || !hasGrantedParent(k)) return false;
                return grantEligibleSite(k, starTargetDist);
            }
            function stepMove() {
                banished = false;
                if (!moveQueue || !moveQueue.length) {
                    moving = false;
                    moveQueue = null;
                    pathPlan = null;
                    setStop(false);
                    return;
                }
                moving = true;
                const from = L.toPixel(S(player).c);
                const next = moveQueue.shift();
                player = next;
                playerAnim = { from, t0: performance.now(), dur: 90 };
                const ps = S(player);
                unlockSteppedGrant(player);
                resolveLandingSite(player);
                if (banished) return; // banish() took over: player teleported, queue cleared
                // collect a cooling crystal if present (Healing boosts the recovery)
                if (ps.crystal) {
                    ps.crystal = false;
                    const flyToXP = heat === 0;
                    recoverHeat(2 + skills.healing.level);
                    const wp = L.toPixel(ps.c);
                    addEffect({
                        kind: "crystalFly",
                        world: { x: wp.x, y: wp.y },
                        targetId: flyToXP ? "xpBar" : "heatBar",
                        dur: 560,
                    });
                }
                // remap when we have moved further than (exploration distance − trigger).
                // if that is <= 0 (trigger >= distance) every step re-explores.
                const a = L.toPixel(S(player).c),
                    b = L.toPixel(S(lastMapKey).c);
                const dist = Math.hypot(a.x - b.x, a.y - b.y) / L.spacing;
                if (dist > cfg.trigger) {
                    growAround(player);
                    lastMapKey = player;
                    refreshStats();
                }
                onStarReached();
                // claim the site if it's claimable; traversal and claiming are now heat-free.
                claimSite(player);
                updateHeat();
                // record-breaking path-distance from origin → xp = 3 × the new record
                const pd = ps.dist;
                if (pd != null && pd > maxDistRecord) {
                    addXP(3 * pd);
                    maxDistRecord = pd;
                }
                renderSkills(); // xp may have changed even without a remap
                setTimeout(() => {
                    playerAnim = null;
                    stepMove();
                }, 92);
            }

            /* [SEC:input] ------------------------------------------------------ input */
            const pointers = new Map(); // id -> {x,y, startX,startY}
            let mode = null; // 'path' | 'pan' | 'pinch'
            let pinchStart = null;
            let pathPlan = null; // the route currently drawn / to be walked
            let dragPath = []; // sites from the character to the current head
            let lastOverSite = null; // last site the finger was over (enter-detection)
            let curOver = null; // site the finger is over right now (or null)

            function onPlayer(sx, sy) {
                const pp = worldToScreen(playerPixel());
                return (
                    Math.hypot(sx - pp.x, sy - pp.y) <=
                    Math.max(16, cam.scale * 0.5)
                );
            }

            /* When the drag enters site `s`, search the tree outward from s up to the
   Pathfinding level. If a site already on dragPath is reached, rewire the path:
   keep dragPath up to that site, then append the bridge out to s (s becomes the
   new head). Returns true if s was successfully connected. */
            function connectEntered(s) {
                const inPath = new Set(dragPath);
                const level = skills.pathfind.level;
                const prev = new Map([[s, null]]);
                let found = inPath.has(s) ? s : null;
                let frontier = [s],
                    depth = 0;
                while (found === null && depth < level && frontier.length) {
                    const next = [];
                    for (const k of frontier) {
                        for (const nk of passKeys(k)) {
                            if (!prev.has(nk) && isSiteShown(S(nk))) {
                                prev.set(nk, k);
                                next.push(nk);
                                if (inPath.has(nk)) {
                                    found = nk;
                                    break;
                                }
                            }
                        }
                        if (found) break;
                    }
                    frontier = next;
                    depth++;
                }
                if (found === null) return false;
                // bridge: found -> ... -> s  (prev chain runs from s's side back to s)
                let seg = [];
                for (let t = found; t !== null; t = prev.get(t)) seg.push(t); // [found, ..., s]
                const idx = dragPath.indexOf(found);
                dragPath = dragPath.slice(0, idx + 1).concat(seg.slice(1));
                return true;
            }

            cv.addEventListener("pointerdown", (e) => {
                cv.setPointerCapture(e.pointerId);
                pointers.set(e.pointerId, {
                    x: e.clientX,
                    y: e.clientY,
                    sx: e.clientX,
                    sy: e.clientY,
                });
                if (pointers.size === 2) {
                    mode = "pinch";
                    const [a, b] = [...pointers.values()];
                    pinchStart = {
                        d: Math.hypot(a.x - b.x, a.y - b.y),
                        scale: cam.scale,
                        mid: { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 },
                        world: screenToWorld((a.x + b.x) / 2, (a.y + b.y) / 2),
                    };
                    pathPlan = null;
                    dragPath = [];
                } else if (onPlayer(e.clientX, e.clientY) && !moving) {
                    mode = "path";
                    dragPath = [player];
                    lastOverSite = player;
                    curOver = player;
                    pathPlan = null;
                } else {
                    mode = "pan";
                }
            });
            cv.addEventListener("pointermove", (e) => {
                const p = pointers.get(e.pointerId);
                if (!p) return;
                const dx = e.clientX - p.x,
                    dy = e.clientY - p.y; // incremental delta since last move
                p.x = e.clientX;
                p.y = e.clientY;
                if (mode === "pinch" && pointers.size >= 2) {
                    const [a, b] = [...pointers.values()];
                    const d = Math.hypot(a.x - b.x, a.y - b.y);
                    cam.scale = Math.max(
                        4,
                        Math.min(120, (pinchStart.scale * d) / pinchStart.d),
                    );
                    const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
                    const w = pinchStart.world;
                    cam.x = w.x - (mid.x - Wd / 2) / cam.scale;
                    cam.y = w.y - (mid.y - Hd / 2) / cam.scale;
                } else if (mode === "pan") {
                    cam.x -= dx / cam.scale;
                    cam.y -= dy / cam.scale;
                } else if (mode === "path") {
                    const w = screenToWorld(e.clientX, e.clientY);
                    const s = siteUnderFinger(w.x, w.y);
                    curOver = s;
                    if (s !== lastOverSite) {
                        lastOverSite = s;
                        if (s !== null) {
                            connectEntered(s);
                            pathPlan = dragPath.slice();
                        }
                    }
                }
            });
            function endPointer(e) {
                const wasPath = mode === "path";
                pointers.delete(e.pointerId);
                if (wasPath && pointers.size === 0) {
                    const head = dragPath.length
                        ? dragPath[dragPath.length - 1]
                        : null;
                    // execute only if released over the site the path actually reaches
                    if (
                        curOver !== null &&
                        curOver === head &&
                        dragPath.length > 1
                    ) {
                        walkPath(dragPath); // pathPlan stays as the highlight during the walk
                    } else {
                        pathPlan = null; // cancelled
                    }
                    dragPath = [];
                    curOver = null;
                    lastOverSite = null;
                }
                if (pointers.size === 0) mode = null;
                else if (pointers.size === 1) mode = "pan";
            }
            cv.addEventListener("pointerup", endPointer);
            cv.addEventListener("pointercancel", endPointer);
            // desktop wheel zoom
            cv.addEventListener(
                "wheel",
                (e) => {
                    e.preventDefault();
                    const w = screenToWorld(e.clientX, e.clientY);
                    const f = Math.exp(-e.deltaY * 0.0015);
                    cam.scale = Math.max(4, Math.min(120, cam.scale * f));
                    cam.x = w.x - (e.clientX - Wd / 2) / cam.scale;
                    cam.y = w.y - (e.clientY - Hd / 2) / cam.scale;
                },
                { passive: false },
            );

            /* [SEC:ui] ------------------------------------------------------------ ui */
            /* UI: one collapsible panel (options, top-left button + popover). The XP bar
   and skills list are always-visible on the right side. The filter select lives
   inside the options panel and calls setViz() so the change animates -- never
   assign vizMode directly here. */
            function refreshStats() {
                let r = 0,
                    md = 0;
                for (const [, s] of sites) {
                    if (s.depth != null) {
                        r++;
                        if (s.depth > md) md = s.depth;
                    }
                }
                document.getElementById("sN").textContent = mappedCount;
                document.getElementById("rN").textContent = r;
                document.getElementById("dN").textContent = md;
            }
            function updateHeat() {
                const mx = maxHeat();
                document.getElementById("heatFill").style.width =
                    (100 * Math.max(0, heat)) / mx + "%";
                document.getElementById("heatTxt").textContent =
                    "Heat " + Math.max(0, heat) + " / " + mx;
            }
            function bindRange(id, key, fmt) {
                const el = document.getElementById(id),
                    out = document.getElementById(id + "V");
                const apply = () => {
                    cfg[key] = +el.value;
                    out.textContent = fmt ? fmt(+el.value) : el.value;
                };
                el.addEventListener("input", apply);
                apply();
            }
            bindRange("seed", "seed");
            bindRange("walk", "walkLimit");

            /* skills panel ------------------------------------------------------------- */
            const skillsEl = document.getElementById("skills");
            const skillOrder = ["explore", "pathfind", "healing"];
            function renderSkills() {
                const n = earnedPoints();
                const avail = availablePoints();
                let cum = 0;
                for (let i = 0; i < n; i++) cum += 5 + i * i;
                const current = totalXP - cum;
                const nextCost = 5 + n * n;
                const pct = Math.min(100, (current / nextCost) * 100);
                document.getElementById("xpFill").style.width = pct + "%";
                document.getElementById("xpTxt").textContent =
                    "xp " + current + " / " + nextCost;
                document.getElementById("ptV").textContent = avail;
                skillsEl.innerHTML = "";
                for (const key of skillOrder) {
                    const sk = skills[key];
                    const row = document.createElement("div");
                    row.className = "skill";
                    const nm = document.createElement("span");
                    nm.className = "nm";
                    nm.textContent = sk.name;
                    const lv = document.createElement("span");
                    lv.className = "lv";
                    lv.textContent = "Lv " + sk.level;
                    const plus = document.createElement("button");
                    plus.className =
                        "plus" + (avail >= sk.level ? " show" : "");
                    plus.textContent = "+";
                    plus.title = "cost " + sk.level + " pts";
                    plus.addEventListener("click", () => incSkill(key));
                    row.append(nm, lv, plus);
                    skillsEl.appendChild(row);
                }
                updateSkillButton();
            }

            document
                .getElementById("filterBtn")
                .addEventListener("change", (e) => setViz(e.target.value));
            document
                .getElementById("dbg")
                .addEventListener(
                    "change",
                    (e) => (showDbg = e.target.checked),
                );
            document
                .getElementById("lattice")
                .addEventListener("change", (e) => {
                    L = Lattices[e.target.value];
                    generate();
                });
            document
                .getElementById("regen")
                .addEventListener("click", () => generate());
            document
                .getElementById("stopBtn")
                .addEventListener("click", stopMove);

            /* collapsible panels: one button per panel, mutually exclusive (closed by
   default). Skills and XP are always-visible on the right; only the options
   panel collapses. */
            const PANELS = {
                menuBtn: "panel",
            };
            const BTN_STACK = ["menuBtn", "xpBar", "skillsPanel"];
            function showButtons(show) {
                for (const id of BTN_STACK) {
                    const b = document.getElementById(id);
                    if (b) b.style.display = show ? "block" : "none";
                }
            }
            function closePanels() {
                for (const id in PANELS)
                    document.getElementById(PANELS[id]).classList.add("closed");
                showButtons(true);
            }
            function openPanel(btnId) {
                closePanels();
                document
                    .getElementById(PANELS[btnId])
                    .classList.remove("closed");
                showButtons(false);
            }
            document
                .getElementById("menuBtn")
                .addEventListener("click", () => openPanel("menuBtn"));
            document
                .getElementById("closeBtn")
                .addEventListener("click", closePanels);
            closePanels();

            /* [SEC:boot] -------------------------------------------------------- boot */
            resize();
            syncSkills();
            renderSkills();
            document.getElementById("filterBtn").value = vizMode;
            updateHeat();
            generate();
            requestAnimationFrame(draw);
        </script>
    </body>
</html>
