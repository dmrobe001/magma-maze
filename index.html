<!doctype html>
<!-- scan from grep [BEGIN:header] to [END:header] for important context -->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
        />
        <title>Unbounded Maze</title>
        <style>
            :root {
                --bg: #0c1014;
                --panel: #141b22e6;
                --line: #2a3742;
                --ink: #cdd9e1;
                --ink-dim: #7d8b96;
                --accent: #e7eef3;
                --warn: #ff9b6b;
            }
            * {
                box-sizing: border-box;
                -webkit-tap-highlight-color: transparent;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                font-family: "Iowan Old Style", ui-serif, Georgia, serif;
                color: var(--ink);
                touch-action: none;
                overscroll-behavior: none;
            }
            #c {
                position: fixed;
                inset: 0;
                display: block;
            }
            /* utility/mono face for all controls — the maze is the only "serif" voice */
            .mono {
                font-family:
                    ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }
            #panel {
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 10;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 12px 13px;
                width: 236px;
                backdrop-filter: blur(8px);
                font-family: ui-monospace, Menlo, Consolas, monospace;
                font-size: 11px;
                line-height: 1.5;
            }
            #panel h1 {
                font-family: "Iowan Old Style", Georgia, serif;
                font-weight: 600;
                font-size: 16px;
                margin: 0 0 2px;
                letter-spacing: 0.2px;
                color: var(--accent);
            }
            #panel .sub {
                color: var(--ink-dim);
                font-size: 10px;
                margin: 0 0 10px;
                letter-spacing: 0.3px;
            }
            .row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin: 7px 0;
            }
            .row label {
                color: var(--ink-dim);
                text-transform: uppercase;
                letter-spacing: 0.6px;
                font-size: 9.5px;
            }
            .row .val {
                color: var(--accent);
                min-width: 30px;
                text-align: right;
            }
            input[type="range"] {
                flex: 1;
                accent-color: #5fd0c8;
                height: 16px;
            }
            select {
                flex: 1;
                background: #0b1116;
                color: var(--ink);
                border: 1px solid var(--line);
                border-radius: 6px;
                padding: 3px 5px;
                font-family: inherit;
                font-size: 11px;
            }
            button {
                width: 100%;
                margin-top: 10px;
                background: #16222b;
                color: var(--accent);
                border: 1px solid var(--line);
                border-radius: 7px;
                padding: 8px;
                font-family: inherit;
                font-size: 11px;
                letter-spacing: 0.5px;
                text-transform: uppercase;
                cursor: pointer;
            }
            button:active {
                background: #1d2d38;
            }
            .check {
                display: flex;
                align-items: center;
                gap: 7px;
                margin: 8px 0 2px;
                cursor: pointer;
            }
            .check input {
                accent-color: #5fd0c8;
            }
            #hint {
                position: fixed;
                bottom: 12px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
                font-family: ui-monospace, Menlo, monospace;
                font-size: 11px;
                color: var(--ink-dim);
                background: #0c1014cc;
                border: 1px solid var(--line);
                border-radius: 20px;
                padding: 6px 14px;
                text-align: center;
                pointer-events: none;
                white-space: nowrap;
            }
            #stats {
                margin-top: 9px;
                padding-top: 8px;
                border-top: 1px solid var(--line);
                color: var(--ink-dim);
                font-size: 10px;
            }
            #stats b {
                color: var(--ink);
                font-weight: 600;
            }
            /* collapsible menu */
            #menuBtn {
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 11;
                width: auto;
                margin: 0;
                padding: 9px 14px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                backdrop-filter: blur(8px);
                font-family: ui-monospace, Menlo, monospace;
                font-size: 11px;
                letter-spacing: 0.5px;
                text-transform: uppercase;
                color: var(--accent);
            }
            #panel {
                transition: opacity 0.12s ease;
            }
            #panel.closed {
                display: none;
            }
            #stopBtn {
                position: fixed;
                bottom: 12px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 12;
                display: none;
                width: auto;
                margin: 0;
                padding: 9px 22px;
                border-radius: 20px;
                background: #3a1f23;
                border: 1px solid #7a3b40;
                color: #ffd9d2;
                font-family: ui-monospace, Menlo, monospace;
                font-size: 12px;
                letter-spacing: 0.8px;
            }
            #stopBtn:active {
                background: #4a282d;
            }
            /* skills */
            #skillHdr {
                color: var(--ink-dim);
                text-transform: uppercase;
                letter-spacing: 0.6px;
                font-size: 9.5px;
                margin-bottom: 4px;
            }
            #skillHdr b {
                color: #4ade80;
                font-weight: 600;
            }
            .skill {
                display: flex;
                align-items: center;
                gap: 7px;
                margin: 6px 0;
            }
            .skill .nm {
                flex: 1;
                color: var(--ink);
                font-size: 10.5px;
            }
            .skill .lv {
                color: var(--ink-dim);
                font-size: 10px;
                min-width: 30px;
                text-align: right;
            }
            .skill .plus {
                width: 22px;
                height: 22px;
                margin: 0;
                padding: 0;
                flex: 0 0 auto;
                line-height: 1;
                border-radius: 6px;
                background: #1c3a36;
                border: 1px solid #2f6b63;
                color: #9af0e6;

                text-transform: none;

                visibility: hidden;

            .skill .plus.show {

            }
            .skill .plus:active {

            }
            #evBtn {
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 11;
                width: auto;
                margin: 0;
                padding: 9px 14px;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                backdrop-filter: blur(8px);
                font-family: ui-monospace, Menlo, monospace;
                font-size: 11px;
                letter-spacing: 0.4px;
                text-transform: none;
                color: var(--ink-dim);
            }
            #evBtn.on {

                border-color: #2f6b8a;
                color: #aee0ff;
            }
            #heatBar {
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 11;
                width: 160px;
                height: 22px;
                background: #1a0e10cc;
                border: 1px solid #5a2a2e;
                border-radius: 11px;
                overflow: hidden;
                backdrop-filter: blur(8px);
            }
            #heatFill {
                position: absolute;
                inset: 0;
                width: 0%;
                background: linear-gradient(90deg, #842222, #ff5a4f);
                transition: width 0.12s ease;
            }
            #heatTxt {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: ui-monospace, Menlo, monospace;
                font-size: 11px;
                letter-spacing: 0.6px;
                color: #fff;
                text-shadow: 0 1px 2px #000a;
            }
            #panel h1 {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            #closeBtn {
                width: 26px;
                height: 26px;
                margin: 0;
                padding: 0;
                line-height: 1;
                font-size: 15px;
                border-radius: 7px;
                background: #16222b;
                color: var(--ink-dim);
                text-transform: none;
                letter-spacing: 0;
            }
            /* xp bar — always visible, top-left below options button */
            #xpBar {
                position: fixed;
                top: 56px;
                left: 12px;
                z-index: 11;
                width: 160px;
                height: 22px;
                background: #0e1a10cc;
                border: 1px solid #2a5a30;
                border-radius: 11px;
                overflow: hidden;
                backdrop-filter: blur(8px);
            }
            #xpFill {
                position: absolute;
                inset: 0;
                width: 0%;
                background: linear-gradient(90deg, #166534, #4ade80);
                transition: width 0.12s ease;
            }
            #xpTxt {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: ui-monospace, Menlo, monospace;
                font-size: 11px;
                letter-spacing: 0.6px;
                color: #fff;
                text-shadow: 0 1px 2px #000a;
            }
            /* skills panel — always visible, stacked below xpBar on the left */
            #skillsPanel {
                position: fixed;
                top: 82px;
                left: 12px;
                z-index: 10;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 8px 10px;
                width: 160px;
                backdrop-filter: blur(8px);
                font-family: ui-monospace, Menlo, Consolas, monospace;
                font-size: 11px;
                line-height: 1.5;
            }
            @media (max-width: 520px) {
                #panel {
                    width: 208px;
                    font-size: 10.5px;
                }
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <button id="menuBtn">☰ options</button>
        <div id="heatBar">
            <div id="heatFill"></div>
            <span id="heatTxt">Heat 0 / 6</span>
        </div>
        <div id="xpBar">
            <div id="xpFill"></div>
            <span id="xpTxt">xp 0 / 5</span>
        </div>
        <div id="panel" class="closed">
            <h1>
                Unbounded Maze <button id="closeBtn" title="Close">×</button>
            </h1>
            <p class="sub">a tree that grows where you walk</p>

            <div class="row">
                <label>Filter</label>
                <select id="filterBtn" aria-label="Visualization filter">
                    <option value="default">default</option>
                    <option value="endVision">end vision</option>
                    <option value="claimed" selected>claimed</option>
                    <option value="distance">distance</option>
                </select>
            </div>
            <div class="row">
                <label>Lattice</label>
                <select id="lattice">
                    <option value="square">square</option>
                    <option value="tri">triangular</option>
                    <option value="hex">hexagonal</option>
                </select>
            </div>
            <div class="row">
                <label>Seed steps</label>
                <input
                    id="seed"
                    type="range"
                    min="20"
                    max="600"
                    value="220"
                    step="20"
                /><span class="val" id="seedV">220</span>
            </div>
            <div class="row">
                <label>Walk limit</label>
                <input
                    id="walk"
                    type="range"
                    min="1500"
                    max="30000"
                    value="12500"
                    step="500"
                /><span class="val" id="walkV">12500</span>
            </div>

            <button id="regen">Regenerate maze</button>
            <label class="check"
                ><input type="checkbox" id="dbg" /> show depth numbers</label
            >

            <div id="stats">
                <div>sites <b id="sN">0</b> · resolved <b id="rN">0</b></div>
                <div>max depth <b id="dN">0</b></div>
            </div>
        </div>

        <div id="skillsPanel">
            <div id="skillHdr">pts <b id="ptV">0</b></div>
            <div id="skills"></div>
        </div>
        <div id="hint">
            drag from the dot to plot a route · drag elsewhere to pan · pinch to
            zoom
        </div>
        <button id="stopBtn">■ stop</button>

        <script>
            "use strict";
            /* [BEGIN:header] ============================================================================
   UNBOUNDED MAZE
   - Seed: loop-erased random walk (LERW). Centre of mass → origin.
   - Growth: Wilson's algorithm maps a wide patch around the player, then
     reveals only a smaller local patch; new patches are stitched onto the
     existing tree whenever the player walks far enough. The map is always a
     single tree (acyclic, connected).
   - Journey: a rotating star marks a site at a target path-distance from the
     origin; candidate star sites are hidden-mapped before selection, granted
     candidates are skipped, and once the current origin→star route is chosen
     any scorched site on it is cooled back to neutral. Walking that route
     kindles sites sandy-tan with a small first-touch Heat cost; stepping off-route
     scorches sites lava-red and raises more Heat. Reaching a valid star grants
     the origin path outright, but holds back any resolved branch whose
     dist+depth can still reach the next star target.
   - Depth: leaf-stripping. A "resolved" site (all lattice neighbours mapped)
     with exactly one depth-less passage neighbour is given depth
     1+max(neighbour depths), or 1 if it is a leaf; the assignment cascades up
     the tree. Frontier sites that are not yet resolved get a "provisional"
     depth computed the same way but without the resolved gate; provisional is
     overwritten by the real depth once a site resolves.
   - Colour: status view starts purple-grey, kindled sites go sandy tan,
     claimed sites go grassy green, granted sites go blue, and scorched sites
     go lava-red; the depth/distance filters still use their specialised
     palettes.
   ========================================================================= */

            /* ============================================================================
   [DOCS] KEEPING THIS FILE'S DOCUMENTATION CURRENT  (read before editing)
   ----------------------------------------------------------------------------
   This single-file game is navigated by greppable tags, not line numbers:
   [SEC:*] marks each code section, [REF:*] marks the reference tables, and the
   [MAP] index lists them all. Treat the docs as part of the code and update
   them IN THE SAME CHANGE -- to the level of detail that helps the next reader
   (human or model) navigate and edit safely, and no more.

   When you ...                          also update ...
   - add / rename / move a section       the [MAP] index AND the [SEC:*] header
   - add or repurpose a site field       [REF:site-record] (meaning/writer/reader)
   - add a mutable global                [REF:globals] (under its owning [SEC])
   - change the per-step recompute order [REF:pipeline]
   - add an animation effect kind        [REF:effects] + a drawEffect() case
   - change what a section reads/writes,  that section's contract stanza
     or an invariant it must preserve     (its Reads / Writes / Invariant lines)

   Style: one terse line per entry; document intent, invariants and cross-refs,
   not what the code already plainly says; prefer editing an existing line over
   adding prose; keep a contract stanza only where the behaviour is non-obvious.
   A new user-facing mechanic should route its state changes through a mutator
   (see [SEC:fx]) so its trigger and animation live in one place.
   ============================================================================ */

            /* ============================================================================
   [MAP] FILE NAVIGATION INDEX  --  grep a tag to jump to its section.
   Each [SEC:*] / [REF:*] tag is unique; a grep returns this index line plus
   the destination. Sections are listed in source order.
   ----------------------------------------------------------------------------
     [SEC:lattices]         square / triangular / hexagonal geometry adapters
     [SEC:world-state]      core globals: L, sites, player, lastMapKey, cfg
     [SEC:skills-xp]        skills, xp -> points, heat economy
     [SEC:viz-state]        visualization mode + its toggles
     [SEC:site-helpers]     S / ensure / passage + mapped accessors
     [SEC:seed-lerw]        initial loop-erased random walk
     [SEC:wilson-patch]     mapPatch + greedyConnect: wide grow + local reveal
     [SEC:depth-resolution] resolved depth, provisional depth, claiming
     [SEC:grow-round]       growAround: the per-step update PIPELINE
     [SEC:distance]         path-distance from origin over the tree
     [SEC:star-target]      origin-distance target search, hidden premap, grants
     [SEC:generate]         full rebuild from scratch
     [SEC:fx]               animation foundation: effects[], filter wave, mutators
     [SEC:draw]             camera, colours, render passes
     [SEC:player-pos]       player tween / pixel position
     [SEC:pathfinding]      depth-climb LCA with BFS fallback
     [SEC:nearest-site]     nearest traversable site under the finger
     [SEC:movement]         walkPath / stepMove, heat, crystals, remap trigger
     [SEC:input]            pointer: drag-to-route, pan, pinch, wheel
     [SEC:ui]               options panel + persistent xp bar / skills list
     [SEC:boot]             startup sequence
   Reference tables:
     [REF:site-record]  every field on a site object: meaning / writer / reader
     [REF:globals]      every mutable global and its owning section
     [REF:pipeline]     the mandatory recompute order (do NOT reorder)
     [REF:effects]      animation effect kinds (crystalFly/claimFly/shock/sitePulse)
   ============================================================================
   [REF:site-record]   sites is a Map<key, site>; a site is born in ensure().
   ----------------------------------------------------------------------------
   FIELD       MEANING                                WRITTEN BY            READ BY
   c           lattice coord tuple [x,y] / [q,r]      ensure (once)         L.x (all over)
   mapped      is it part of the spanning tree?       markMapped            isMapped, resolve, draw
   pass        Set<key> of tree-edge neighbours       addPassage            passKeys, draw, paths
   depth       resolved leaf-strip depth (null=none)  tryAssignDepth        colour, rank, H, claim, grant
   prov        provisional depth, replaced by depth   recomputeProvisional  colour, effDepth, H
   resolved    are ALL lattice nbrs mapped yet?       recomputeResolved     tryAssignDepth gate
   inPatch     revealed / traversable on the map      mapPatch              visSite, finger, distance
   revealAt    first draw/traverse time for ripple    scheduleReveal        visSite, finger, paths
   granted     can this site be claimed yet?          grantPath|cascade|stepMove colour, claim, star search
   claimed     claimed for depth^2 xp?                claimSite             colour, rank, visSite
   kindled     walked as safe star-route ground?      stepMove             colour, rank, visSite
   scorched    walked as lava ground?                 stepMove|retarget    colour, rank, visSite
   dist        tree path-distance from origin         recomputeDistance     colour, rank, stepMove
   reachEx     is the whole origin->here path seen?   recomputeDistance     colour(distance), rank
   crystal     does a cooling crystal sit here?       mapPatch | stepMove   draw, stepMove
   unclaimed   # of depth-children not yet claimed    tryAssignDepth|claim  claimSite gate
   ............................................................................
   GOTCHA: "mapped" (in the tree) is NOT "inPatch" (revealed on the map). A
   passing walk can map a site while it stays hidden until a later reveal. And prov
   is a throwaway estimate: once a site resolves, its real depth wins.
   ============================================================================
   [REF:globals]   mutable module state, grouped by owning section.
   ----------------------------------------------------------------------------
   [SEC:world-state]   L (active lattice) | sites (the world Map) | player (key)
                      | lastMapKey (player at last remap) | cfg {radius,
                      revealRadius, trigger, seed, walkLimit, walkRetries}
   [SEC:skills-xp]     skills{level} | totalXP | heat | stagedXP  (maxHeat via healing)
   [SEC:viz-state]     vizMode | showDbg | originKey | maxDistRecord
   [SEC:site-helpers]  mappedCount
   [SEC:fx]            now (per-frame clock) | effects[] | WAVE_SPEED | waveActive
                       | wavePrev | waveFront | waveMax | waveDist (key -> hop dist)
   [SEC:star-target]   starKey | starTargetDist | starStepDist
   [SEC:draw]          cv | ctx | DPR | Wd | Hd | cam {x, y, scale}
   [SEC:player-pos]    playerAnim (active tween, or null)
   [SEC:movement]      moveQueue | moving | banished
   [SEC:input]         pointers | mode | pinchStart | pathPlan | dragPath
                       | lastOverSite | curOver
   ============================================================================
   [REF:pipeline]   Per-step world update. growAround() runs these IN ORDER;
   reordering silently corrupts depth and colour. generate() wraps the same
   sequence with heat resets around the first (free) reveal.
   ----------------------------------------------------------------------------
     1. mapPatch(center, radii)   grow tree wide, reveal local sites, maybe spawn crystals
     2. totalXP += patchCount     +1 per first-time-revealed site in the patch
     3. recomputeResolved(...)    flag sites whose every lattice nbr is mapped
     4. propagateDepth(...)       leaf-strip resolved sites -> depth (cascades up)
     5. recomputeProvisional()    estimate prov for the still-unresolved sites
     6. recomputeDistance()       BFS from origin -> dist, reachEx
     7. retarget star if needed   keep the next origin-distance objective live
     8. updateHeat(); renderSkills()
   WHY: step 4 reads the flag from step 3; step 5 seeds off the depths set in
   step 4 and is discarded as sites resolve; step 6 only needs mapped + pass.
   The star search reads those distances in step 7, and the UI refresh (8)
   reflects the finished state.
   ============================================================================ */

            /* [SEC:lattices] ------------------------------------------------ lattices */
            /* A lattice supplies: neighbors(site)->[site], toPixel(site)->{x,y},
   fromPixel(x,y)->site (nearest), patch(center,r)->[site], key/unkey.
   Sites are integer-tuples; swapping in any other neighbour function is all it
   takes to change the maze's geometry. */
            // [END:header]
            const SQRT3 = Math.SQRT3 || Math.sqrt(3);
            const Lattices = {
                square: {
                    name: "square",
                    neighbors([x, y]) {
                        return [
                            [x + 1, y],
                            [x - 1, y],
                            [x, y + 1],
                            [x, y - 1],
                        ];
                    },
                    toPixel([x, y]) {
                        return { x: x, y: y };
                    },
                    fromPixel(px, py) {
                        return [Math.round(px), Math.round(py)];
                    },
                    patch([cx, cy], r) {
                        const s = [];
                        for (let dx = -r; dx <= r; dx++)
                            for (let dy = -r; dy <= r; dy++)
                                s.push([cx + dx, cy + dy]);
                        return s;
                    },
                    key([x, y]) {
                        return x + "," + y;
                    },
                    unkey(k) {
                        const [a, b] = k.split(",");
                        return [+a, +b];
                    },
                    spacing: 1,
                },
                tri: {
                    // triangular lattice, degree 6, axial coords
                    name: "triangular",
                    neighbors([q, r]) {
                        return [
                            [q + 1, r],
                            [q - 1, r],
                            [q, r + 1],
                            [q, r - 1],
                            [q + 1, r - 1],
                            [q - 1, r + 1],
                        ];
                    },
                    toPixel([q, r]) {
                        return { x: q + r * 0.5, y: r * SQRT3 * 0.5 };
                    },
                    fromPixel(px, py) {
                        const r = Math.round(py / (SQRT3 * 0.5));
                        const q = Math.round(px - r * 0.5);
                        return [q, r];
                    },
                    patch([cq, cr], rr) {
                        const s = [];
                        for (let dq = -rr; dq <= rr; dq++)
                            for (let dr = -rr; dr <= rr; dr++)
                                s.push([cq + dq, cr + dr]);
                        return s;
                    },
                    key([q, r]) {
                        return q + "," + r;
                    },
                    unkey(k) {
                        const [a, b] = k.split(",");
                        return [+a, +b];
                    },
                    spacing: 1,
                },
                hex: {
                    // honeycomb (degree 3), brick-wall coordinates
                    name: "hexagonal",
                    neighbors([x, y]) {
                        const horiz =
                            ((x + y) & 1) === 0 ? [x + 1, y] : [x - 1, y];
                        return [[x, y + 1], [x, y - 1], horiz];
                    },
                    toPixel([x, y]) {
                        return { x: x * 0.5, y: y * 0.6 + (x & 1) * 0.0 };
                    },
                    fromPixel(px, py) {
                        const x = Math.round(px / 0.5);
                        const y = Math.round(py / 0.6);
                        return [x, y];
                    },
                    patch([cx, cy], r) {
                        const s = [];
                        for (let dx = -r; dx <= r; dx++)
                            for (let dy = -(r + 1); dy <= r + 1; dy++)
                                s.push([cx + dx, cy + dy]);
                        return s;
                    },
                    key([x, y]) {
                        return x + "," + y;
                    },
                    unkey(k) {
                        const [a, b] = k.split(",");
                        return [+a, +b];
                    },
                    spacing: 1,
                },
            };

            /* [SEC:world-state] ------------------------------------------ world state */
            let L = Lattices.square;
            let sites; // key -> {c:[..], mapped, pass:Set(key), depth, prov, resolved}
            let player; // key
            let lastMapKey; // player key at last remap
            let cfg = {
                radius: 1,
                revealRadius: 1,
                trigger: 0,
                seed: 220,
                walkLimit: 12500,
                walkRetries: 8,
            };

            /* [SEC:skills-xp] -------------------------------------------- skills + xp */
            /* XP: +1 per site in the revealed local patch each time a patch is explored
   (already-revealed patch sites still count; hidden mapped tendrils do not
   until a later local reveal contains them). XP unlocks skill points — the
   n-th point costs 5+(n-1)^2 xp (quadratic growth). A point is spent to raise
   a skill, costing a number of points equal to the skill's current level. All
   skills start at 1. */
            const skills = {
                explore: { name: "Exploration", level: 1 },
                pathfind: { name: "Pathfinding", level: 1 },
                healing: { name: "Healing", level: 1 },
            };
            let totalXP = 0;
            /* Heat: a red bar that starts empty. Landing on an ungranted site off the
   current origin→star route scorches it for 4 heat the first time, then 1 heat
   on later red revisits. Walking an ungranted site on the route kindles it
   grassy green and adds 1 heat only on its first safe touch. Crystals cool
   2+Healing heat; any excess cooling becomes XP. Max heat is 5+Healing. */
            let heat = 0;
            let stagedXP = 0; // XP progress currently held at the star; 0 if none
            function maxHeat() {
                return 5 + skills.healing.level;
            }
            function gainHeat(n) {
                if (!n) return;
                if (heat + n > maxHeat()) {
                    banish();
                } else {
                    heat += n;
                }
            }
            function recoverHeat(n) {
                if (!n) return;
                const cooled = Math.min(heat, n);
                heat -= cooled;
                const overflow = n - cooled;
                if (overflow > 0) addXP(overflow);
            }
            /* banish: called when heat would exceed max. Stages the player's current XP
   progress at the star (old staged XP is permanently lost), resets heat to 0,
   and teleports the player back to origin. */
            function banish() {
                const n = earnedPoints();
                let cum = 0;
                for (let i = 0; i < n; i++) cum += 5 + i * i;
                const progress = totalXP - cum;
                stagedXP = progress; // overwrites any previously staged XP (it is lost)
                totalXP -= progress;
                heat = 0;
                banished = true;
                stopMove();
                if (originKey) {
                    player = originKey;
                    playerAnim = null;
                    growAround(player);
                    lastMapKey = player;
                }
                if (starKey && progress > 0) {
                    const wp = L.toPixel(S(starKey).c);
                    addEffect({
                        kind: "xpFly",
                        world: { x: wp.x, y: wp.y },
                        radius: Math.sqrt(progress),
                        dur: 900,
                    });
                }
                renderSkills();
                updateHeat();
                refreshStats();
            }
            function earnedPoints() {
                let n = 0,
                    cum = 0;
                for (;;) {
                    const cost = 5 + n * n;
                    if (cum + cost <= totalXP) {
                        cum += cost;
                        n++;
                    } else break;
                }
                return n;
            }
            function spentPoints() {
                let s = 0;
                for (const k in skills) {
                    const L = skills[k].level;
                    s += (L * (L - 1)) / 2;
                }
                return s;
            }
            function availablePoints() {
                return earnedPoints() - spentPoints();
            }
            function incSkill(k) {
                if (availablePoints() >= skills[k].level) {
                    skills[k].level++;
                    syncSkills();
                    renderSkills();
                    updateHeat();
                }
            }
            function syncSkills() {
                cfg.radius = 10 * skills.explore.level; // grow the hidden tree farther ahead
                cfg.revealRadius = skills.explore.level; // reveal only the local neighbourhood
                cfg.trigger = skills.explore.level / 2; // remap when moved-dist > half exploration
            }

            /* [SEC:viz-state] ----------------------------------- visualization state */
            /* visualization: one mode at a time. 'default' and 'claimed' both show the
   status palette (purple-grey / green / lava-red), while 'endVision' uses the
   200-site colour wheel capped at depth = Exploration level and 'distance'
   shows revealed origin-path distance. Switch modes via setViz() in [SEC:fx],
   which animates the change as a wave from the player; assign vizMode directly
   only to skip that animation. */
            let vizMode = "claimed";
            let showDbg = false;
            let originKey = null; // the starting site (for path-distance modes)
            let maxDistRecord = 0; // furthest path-distance the character has reached

            /* [SEC:site-helpers] ----------------------------------- site accessors */
            function S(k) {
                return sites.get(k);
            }
            function ensure(c) {
                const k = L.key(c);
                let s = sites.get(k);
                if (!s) {
                    s = {
                        c,
                        mapped: false,
                        pass: new Set(),
                        depth: null,
                        prov: null,
                        resolved: false,
                        inPatch: false,
                        granted: false,
                        claimed: false,
                        kindled: false,
                        scorched: false,
                        dist: null,
                        reachEx: false,
                        crystal: false,
                        unclaimed: 0,
                        revealAt: 0,
                    };
                    sites.set(k, s);
                }
                return s;
            }
            function nbrKeys(k) {
                return L.neighbors(S(k).c).map((c) => L.key(c));
            }
            function passKeys(k) {
                return [...S(k).pass];
            }
            function isMapped(k) {
                const s = sites.get(k);
                return !!(s && s.mapped);
            }

            function addPassage(ka, kb) {
                S(ka).pass.add(kb);
                S(kb).pass.add(ka);
            }
            function markMapped(k) {
                const s = S(k);
                if (!s.mapped) {
                    s.mapped = true;
                    mappedCount++;
                }
            }
            let mappedCount = 0;

            /* [SEC:seed-lerw] ---------------------------------------------- seed LERW */
            function loopErasedWalk(start, steps) {
                // a plain loop-erased random walk on the lattice for `steps` total moves
                let path = [start];
                const idx = new Map([[L.key(start), 0]]);
                let cur = start;
                for (let i = 0; i < steps; i++) {
                    const ns = L.neighbors(cur);
                    const next = ns[(Math.random() * ns.length) | 0];
                    const nk = L.key(next);
                    if (idx.has(nk)) {
                        // erase the loop back to the earlier visit
                        const at = idx.get(nk);
                        for (let j = at + 1; j < path.length; j++)
                            idx.delete(L.key(path[j]));
                        path.length = at + 1;
                        cur = path[at];
                    } else {
                        idx.set(nk, path.length);
                        path.push(next);
                        cur = next;
                    }
                }
                return path;
            }

            /* [SEC:wilson-patch] ---------------------------------------- Wilson patch */
            /* Writes: site.mapped, site.pass (new tree edges), site.inPatch, site.crystal.
   Invariant: the world stays ONE tree
   (acyclic, connected); every Wilson path attaches without making a cycle. */
            /* Fill a wide hidden patch around `center` with Wilson's algorithm, then reveal
   only a smaller local patch. The loop-erased walk is NOT confined — it may
   wander anywhere on the lattice and terminates on any mapped site. If a
   single walk runs past the step limit it is thrown away and restarted from the
   same cell; after several restarts a deterministic walk toward the tree is
   used as a guaranteed fallback. Wilson's is order-independent, so cells are
   filled centre-outward to densify the tree fast. */
            function sortPatchByDistance(patch, center) {
                const cp = L.toPixel(center);
                patch.sort((a, b) => {
                    const pa = L.toPixel(a),
                        pb = L.toPixel(b);
                    return (
                        (pa.x - cp.x) ** 2 +
                        (pa.y - cp.y) ** 2 -
                        ((pb.x - cp.x) ** 2 + (pb.y - cp.y) ** 2)
                    );
                });
            }
            function scheduleReveal(centerKey, regionKeys, revealedKeys) {
                if (!revealedKeys.length) return;
                const region = new Set(
                    regionKeys.filter((k) => {
                        const s = sites.get(k);
                        return s && s.inPatch;
                    }),
                );
                const start = currentTime();
                if (!region.has(centerKey)) {
                    for (const k of revealedKeys) S(k).revealAt = start;
                    return;
                }
                const dist = new Map([[centerKey, 0]]);
                const q = [centerKey];
                let qi = 0;
                while (qi < q.length) {
                    const k = q[qi++],
                        d = dist.get(k);
                    for (const nk of passKeys(k)) {
                        if (!region.has(nk) || dist.has(nk)) continue;
                        dist.set(nk, d + 1);
                        q.push(nk);
                    }
                }
                const msPerSite = 100;
                for (const k of revealedKeys) {
                    const d = dist.get(k) || 0;
                    S(k).revealAt = start + d * msPerSite;
                }
            }
            function greedyConnect(startC) {
                // deterministic descent toward the (mapped) player — only used as a safety net
                let pc = [startC];
                const idx = new Map([[L.key(startC), 0]]);
                let cur = startC,
                    guard = 0;
                const tgt = L.toPixel(S(player).c);
                while (!isMapped(L.key(cur))) {
                    if (++guard > 200000) break;
                    let best = null,
                        bd = Infinity;
                    for (const nc of L.neighbors(cur)) {
                        const p = L.toPixel(nc);
                        const d = (p.x - tgt.x) ** 2 + (p.y - tgt.y) ** 2;
                        if (d < bd) {
                            bd = d;
                            best = nc;
                        }
                    }
                    cur = best;
                    const k = L.key(cur);
                    if (idx.has(k)) {
                        const at = idx.get(k);
                        for (let j = at + 1; j < pc.length; j++)
                            idx.delete(L.key(pc[j]));
                        pc.length = at + 1;
                        cur = pc[at];
                    } else {
                        idx.set(k, pc.length);
                        pc.push(cur);
                    }
                }
                return pc;
            }
            function mapPatch(centerKey, radius, revealRadius) {
                const center = S(centerKey).c;
                revealRadius =
                    revealRadius === undefined
                        ? cfg.revealRadius
                        : revealRadius;
                const patch = L.patch(center, radius);
                const revealPatch =
                    revealRadius >= 0 ? L.patch(center, revealRadius) : [];
                for (const c of patch) ensure(c);
                for (const c of revealPatch) ensure(c);
                sortPatchByDistance(patch, center);
                sortPatchByDistance(revealPatch, center);

                const newlyMapped = [];
                const limit = cfg.walkLimit;
                // map the full explored patch centre-outward; revealing is handled separately
                for (const c of patch) {
                    const startK = L.key(c);
                    if (isMapped(startK)) continue;

                    // map it into the tree first (Wilson loop-erased walk) if it isn't yet
                    let path = null,
                        attempts = 0;
                    while (path === null) {
                        let pc = [c];
                        const idx = new Map([[startK, 0]]);
                        let cur = c,
                            steps = 0,
                            hit = false;
                        while (true) {
                            if (isMapped(L.key(cur))) {
                                hit = true;
                                break;
                            }
                            if (++steps > limit) break; // too long → restart
                            const ns = L.neighbors(cur);
                            const nc = ns[(Math.random() * ns.length) | 0];
                            const nk = L.key(nc);
                            if (idx.has(nk)) {
                                const at = idx.get(nk);
                                for (let j = at + 1; j < pc.length; j++)
                                    idx.delete(L.key(pc[j]));
                                pc.length = at + 1;
                                cur = pc[at];
                            } else {
                                idx.set(nk, pc.length);
                                pc.push(nc);
                                cur = nc;
                            }
                        }
                        if (hit) path = pc;
                        else if (++attempts >= cfg.walkRetries)
                            path = greedyConnect(c);
                    }
                    for (let j = 0; j < path.length; j++) ensure(path[j]);
                    for (let j = 0; j < path.length - 1; j++) {
                        const a = L.key(path[j]),
                            b = L.key(path[j + 1]);
                        addPassage(a, b);
                        markMapped(a);
                    }
                    markMapped(L.key(path[path.length - 1]));
                    for (const cc of path) newlyMapped.push(L.key(cc));
                }

                const revealKeys = [];
                const newlyVisible = [];
                for (const c of revealPatch) {
                    const k = L.key(c);
                    const s = S(k);
                    if (!s.mapped) continue;
                    revealKeys.push(k);
                    if (s.inPatch) continue;
                    s.inPatch = true;
                    newlyVisible.push(k);
                    if (Math.random() < 1 / 5) s.crystal = true;
                }
                scheduleReveal(centerKey, revealKeys, newlyVisible);

                return {
                    mapped: [...new Set(newlyMapped)],
                    patchCount: newlyVisible.length, // +1 xp per first-time reveal only
                };
            }

            /* [SEC:depth-resolution] -------------------------------------- resolution */
            /* Writes: site.resolved, site.depth, site.prov, site.unclaimed, site.granted,
   site.claimed,
   totalXP (on claim). Invariant: prov is overwritten the instant a site
   resolves; the unclaimed counter is maintained incrementally, never rebuilt. */
            function recomputeResolved(keys) {
                // returns the subset that is (now) resolved
                const out = [];
                for (const k of keys) {
                    const s = sites.get(k);
                    if (!s || !s.mapped) continue;
                    const all = nbrKeys(k).every((nk) => isMapped(nk));
                    s.resolved = all;
                    if (all) out.push(k);
                }
                return out;
            }

            /* leaf-stripping for RESOLVED depth ---------------------------------------- */
            function tryAssignDepth(k) {
                const s = S(k);
                if (s.depth != null) return false;
                if (!s.mapped || !s.resolved) return false;
                const pn = passKeys(k);
                let depthless = 0,
                    maxd = 0,
                    anyDepth = false;
                for (const nk of pn) {
                    const d = S(nk).depth;
                    if (d == null) depthless++;
                    else {
                        anyDepth = true;
                        if (d > maxd) maxd = d;
                    }
                }
                if (depthless !== 1) return false;
                s.depth = anyDepth ? maxd + 1 : 1; // leaf → 1
                // claim bookkeeping: count this node's depth-children (passage neighbours with
                // smaller depth — all already assigned) that are not yet claimed. A node is
                // claimable once this hits 0. Tracked incrementally, never rebuilt.
                let uc = 0;
                for (const nk of pn) {
                    const ns = S(nk);
                    if (ns.depth != null && ns.depth < s.depth && !ns.claimed)
                        uc++;
                }
                s.unclaimed = uc;
                if (s.granted) cascadeGranted([k], starTargetDist);
                return true;
            }
            function propagateDepth(seeds) {
                const stack = [...seeds];
                while (stack.length) {
                    const k = stack.pop();
                    if (tryAssignDepth(k)) {
                        // a new depth can unlock any passage neighbour (its parent direction
                        // and any sibling that was waiting on this branch)
                        for (const nk of passKeys(k)) stack.push(nk);
                    }
                }
            }

            /* A site is claimable iff it is granted, has a resolved depth, and all of its
   depth-descendants are claimed (tracked incrementally via the `unclaimed`
   counter). Claiming awards depth^2 xp and decrements the parent's counter so
   the parent may become claimable in turn. */
            function claimSite(k) {
                const s = S(k);
                if (
                    !s.granted ||
                    s.claimed ||
                    s.depth == null ||
                    s.unclaimed !== 0
                )
                    return false;
                s.claimed = true;
                addXP(s.depth * s.depth); // xp = (depth)^2
                for (const nk of passKeys(k)) {
                    // notify the parent (higher depth)
                    const ns = S(nk);
                    if (
                        ns.depth != null &&
                        ns.depth > s.depth &&
                        ns.unclaimed > 0
                    )
                        ns.unclaimed--;
                }
                const wp = L.toPixel(s.c);
                addEffect({
                    kind: "claimFly",
                    world: { x: wp.x, y: wp.y },
                    depth: s.depth,
                    dur: 700,
                });
                return true;
            }

            /* PROVISIONAL depth -------------------------------------------------------- */
            /* Recomputed over U = mapped sites lacking a real depth. U is a forest (an
   induced subgraph of the tree), so we leaf-strip it, seeding values from the
   resolved boundary. This reproduces the spec's "propagate through unresolved
   sites, incrementing depth" and is overwritten the moment a site resolves. */
            function recomputeProvisional() {
                const U = [];
                for (const [k, s] of sites) {
                    if (s.mapped && s.depth == null) {
                        s.prov = null;
                        U.push(k);
                    }
                }
                const inU = new Set(U);
                const remaining = new Map();
                const queue = [];
                for (const k of U) {
                    let c = 0;
                    for (const nk of passKeys(k)) if (inU.has(nk)) c++;
                    remaining.set(k, c);
                    if (c <= 1) queue.push(k);
                }
                const assigned = new Set();
                while (queue.length) {
                    const k = queue.shift();
                    if (assigned.has(k)) continue;
                    // value from any passage neighbour that already has a value
                    let maxv = 0,
                        any = false;
                    for (const nk of passKeys(k)) {
                        const s = S(nk);
                        let v = null;
                        if (s.depth != null) v = s.depth;
                        else if (assigned.has(nk) && s.prov != null) v = s.prov;
                        if (v != null) {
                            any = true;
                            if (v > maxv) maxv = v;
                        }
                    }
                    S(k).prov = any ? maxv + 1 : 1;
                    assigned.add(k);
                    for (const nk of passKeys(k)) {
                        if (inU.has(nk) && !assigned.has(nk)) {
                            const r = remaining.get(nk) - 1;
                            remaining.set(nk, r);
                            if (r <= 1) queue.push(nk);
                        }
                    }
                }
            }

            /* [SEC:grow-round] ------------------------------- per-step PIPELINE */
            /* Order is load-bearing; see [REF:pipeline] near the top of file. */
            /* one growth round: map a patch, award xp, then update resolution + depths */
            function finalizeMappedGrowth(mappedKeys, allowRetarget) {
                // sites whose resolution may have changed = added ∪ their neighbours
                const touched = new Set();
                for (const k of mappedKeys) {
                    touched.add(k);
                    for (const nk of nbrKeys(k))
                        if (isMapped(nk)) touched.add(nk);
                }
                const nowResolved = recomputeResolved([...touched]);
                propagateDepth(nowResolved);
                recomputeProvisional();
                recomputeDistance();
                if (allowRetarget && starKey == null) retargetStar();
            }
            function growAround(centerKey) {
                const res = mapPatch(centerKey, cfg.radius);
                addXP(res.patchCount); // +1 per site in the visible patch
                finalizeMappedGrowth(res.mapped, true);
                updateHeat();
                renderSkills();
            }

            /* [SEC:distance] ------------------------------ path-distance from origin */
            /* Path-distance from the origin over the whole tree (a tree distance, so it is
   permanent once set). In the same pass, mark reachEx = true when every site on
   the origin→site path has been explored (in a patch); distance mode only
   colours reachEx sites, leaving unexplored-path sites white. */
            function recomputeDistance() {
                for (const [, s] of sites) {
                    s.dist = null;
                    s.reachEx = false;
                }
                if (!originKey || !isMapped(originKey)) return;
                const o = S(originKey);
                o.dist = 0;
                o.reachEx = o.inPatch;
                const q = [originKey];
                while (q.length) {
                    const k = q.shift();
                    const s = S(k);
                    for (const nk of passKeys(k)) {
                        const ns = S(nk);
                        if (ns.dist === null) {
                            ns.dist = s.dist + 1;
                            ns.reachEx = s.reachEx && ns.inPatch;
                            q.push(nk);
                        }
                    }
                }
            }

            /* [SEC:star-target] ---------------------------------------- star target */
            const STAR_START_DIST = 2;
            const STAR_STEP_START = 1;
            let starKey = null;
            let starTargetDist = STAR_START_DIST;
            let starStepDist = STAR_STEP_START;

            function randomChoice(arr) {
                return arr.length
                    ? arr[(Math.random() * arr.length) | 0]
                    : null;
            }
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }
            function searchFromOrigin(targetDist, shownOnly) {
                if (!originKey || !isMapped(originKey)) {
                    return { candidates: [], prev: new Map() };
                }
                if (targetDist === 0) {
                    return {
                        candidates:
                            !shownOnly || isSiteShown(S(originKey))
                                ? [originKey]
                                : [],
                        prev: new Map([[originKey, null]]),
                    };
                }
                const prev = new Map([[originKey, null]]);
                let frontier = [originKey];
                let depth = 0;
                while (frontier.length && depth < targetDist) {
                    const next = [];
                    for (const k of frontier) {
                        for (const nk of passKeys(k)) {
                            if (prev.has(nk)) continue;
                            const ns = S(nk);
                            if (!ns || !ns.mapped) continue;
                            if (shownOnly && !isSiteShown(ns)) continue;
                            prev.set(nk, k);
                            next.push(nk);
                        }
                    }
                    frontier = next;
                    depth++;
                }
                return { candidates: frontier, prev };
            }
            function hiddenMapAround(centerKey, radius) {
                if (!centerKey || !S(centerKey) || !S(centerKey).mapped)
                    return 0;
                const res = mapPatch(centerKey, radius, -1);
                finalizeMappedGrowth(res.mapped, false);
                return res.mapped.length;
            }
            function hiddenMapOriginPatch(radius) {
                if (!originKey || !S(originKey) || !S(originKey).mapped)
                    return 0;
                const res = mapPatch(originKey, radius, -1);
                finalizeMappedGrowth(res.mapped, false);
                return res.mapped.length;
            }
            function currentStarPath() {
                return starKey && originKey
                    ? bfsPath(originKey, starKey)
                    : null;
            }
            function resetScorchedOnPath(path) {
                if (!path) return;
                for (const k of path) {
                    const s = S(k);
                    if (!s || !s.scorched) continue;
                    s.scorched = false;
                    s.kindled = false;
                }
            }
            function isOnStarPath(k) {
                const path = currentStarPath();
                return !!(path && path.includes(k));
            }
            function kindleSite(k) {
                const s = S(k);
                if (!s) return;
                s.kindled = true;
                s.scorched = false;
            }
            function grantSite(k) {
                const s = S(k);
                if (!s) return;
                s.granted = true;
                s.kindled = false;
                s.scorched = false;
            }
            function subtreeCanReachTarget(s, targetDist) {
                return (
                    !!s &&
                    s.depth != null &&
                    s.dist != null &&
                    s.dist + s.depth >= targetDist
                );
            }
            function canGrantDescendant(s, targetDist) {
                return (
                    !!s &&
                    s.depth != null &&
                    s.dist != null &&
                    !subtreeCanReachTarget(s, targetDist)
                );
            }
            function hasGrantedParent(k) {
                const s = S(k);
                if (!s || s.depth == null) return false;
                for (const nk of passKeys(k)) {
                    const ns = S(nk);
                    if (
                        ns &&
                        ns.granted &&
                        ns.depth != null &&
                        ns.depth > s.depth
                    )
                        return true;
                }
                return false;
            }
            function cascadeGranted(seedKeys, targetDist) {
                const stack = [...new Set(seedKeys)];
                const seen = new Set();
                while (stack.length) {
                    const k = stack.pop();
                    if (seen.has(k)) continue;
                    seen.add(k);
                    const s = S(k);
                    if (!s || !s.granted || s.depth == null) continue;
                    for (const nk of passKeys(k)) {
                        const ns = S(nk);
                        if (!ns || ns.depth == null || ns.depth >= s.depth)
                            continue;
                        if (!ns.granted) {
                            if (!canGrantDescendant(ns, targetDist)) continue;
                            grantSite(nk);
                        }
                        stack.push(nk);
                    }
                }
            }
            function grantEligibleSite(k, targetDist) {
                const s = S(k);
                if (!s || s.granted || !canGrantDescendant(s, targetDist))
                    return false;
                grantSite(k);
                cascadeGranted([k], targetDist);
                return true;
            }
            function grantPath(path, targetDist) {
                if (!path || !path.length) return;
                for (const k of path) grantSite(k);
                const seeds = [...path];
                for (const k of path) {
                    const s = S(k);
                    if (!s || s.depth != null) continue;
                    for (const nk of passKeys(k)) {
                        const ns = S(nk);
                        if (!ns || ns.depth == null) continue;
                        if (grantEligibleSite(nk, targetDist)) seeds.push(nk);
                    }
                }
                cascadeGranted(seeds, targetDist);
            }
            function chooseStarSite(targetDist) {
                const starMapRadius = 10 * skills.explore.level;
                let widenedOrigin = false;
                const tested = new Set();
                while (true) {
                    const search = searchFromOrigin(targetDist, false);
                    const candidates = shuffle(search.candidates.slice());
                    for (const k of candidates) {
                        if (tested.has(k)) continue;
                        tested.add(k);
                        hiddenMapAround(k, starMapRadius);
                        const s = S(k);
                        if (s && s.mapped && !s.granted) return k;
                    }
                    if (widenedOrigin) return null;
                    if (hiddenMapOriginPatch(targetDist) <= 0) return null;
                    widenedOrigin = true;
                }
            }
            function retargetStar() {
                starKey = chooseStarSite(starTargetDist);
                resetScorchedOnPath(currentStarPath());
            }
            function onStarReached() {
                if (!starKey || player !== starKey) return;
                if (stagedXP > 0) {
                    // restore XP held at the star; fire a return circle from star to xpBar
                    const wp = L.toPixel(S(starKey).c);
                    addEffect({
                        kind: "xpReturn",
                        world: { x: wp.x, y: wp.y },
                        radius: Math.sqrt(stagedXP),
                        dur: 900,
                    });
                    addXP(stagedXP);
                    stagedXP = 0;
                }
                const reached = starKey;
                const nextTargetDist = starTargetDist + starStepDist;
                grantPath(bfsPath(originKey, reached), nextTargetDist);
                starTargetDist = nextTargetDist;
                starStepDist++;
                starKey = null;
                retargetStar();
            }

            /* [SEC:generate] ------------------------------------------------ generate */
            function generate() {
                const INITIAL_PATCH_RADIUS = 5;
                sites = new Map();
                mappedCount = 0;
                // 1) seed path
                const path = loopErasedWalk([0, 0], cfg.seed);
                for (let i = 0; i < path.length; i++) {
                    ensure(path[i]);
                    markMapped(L.key(path[i]));
                }
                for (let i = 0; i < path.length - 1; i++)
                    addPassage(L.key(path[i]), L.key(path[i + 1]));
                // 2) centre of mass → nearest path site = origin
                let cx = 0,
                    cy = 0;
                for (const c of path) {
                    const p = L.toPixel(c);
                    cx += p.x;
                    cy += p.y;
                }
                cx /= path.length;
                cy /= path.length;
                let best = path[0],
                    bd = Infinity;
                for (const c of path) {
                    const p = L.toPixel(c);
                    const d = (p.x - cx) ** 2 + (p.y - cy) ** 2;
                    if (d < bd) {
                        bd = d;
                        best = c;
                    }
                }
                player = L.key(best);
                lastMapKey = player;
                originKey = player; // starting point for path-distance modes
                maxDistRecord = 0;
                stagedXP = 0;
                starKey = null;
                starTargetDist = STAR_START_DIST;
                starStepDist = STAR_STEP_START;
                // 3) Wilson patch around origin, then depths + distances
                heat = 0; // the initial reveal is free
                const liveRadius = cfg.radius,
                    liveRevealRadius = cfg.revealRadius;
                cfg.radius = INITIAL_PATCH_RADIUS;
                cfg.revealRadius = INITIAL_PATCH_RADIUS;
                growAround(player);
                cfg.radius = liveRadius;
                cfg.revealRadius = liveRevealRadius;
                recomputeDistance();
                retargetStar();
                heat = 0;
                updateHeat();
                // camera
                const p = L.toPixel(best);
                cam.x = p.x;
                cam.y = p.y;
                cam.scale = baseScale();
                pathPlan = null;
                moveQueue = null;
                moving = false;
                setStop(false);
                effects.length = 0;
                waveActive = false;
                wavePrev = null;
                waveDist.clear(); // drop transient fx/wave
                refreshStats();
            }

            /* [SEC:fx] ------------------------------------------- animation foundation */
            /* Three layers, all driven by the existing requestAnimationFrame(draw) loop:
   (1) `effects[]` -- transient one-off visuals (shockwave, crystal fly-up, and
       any future spark/pulse). Each is {kind, t0, dur, ...}; drawEffect() reads
       eased progress per frame and the draw loop splices expired ones. Adding a
       new effect = push one object + add a case in drawEffect().
   (2) the filter WAVE -- a colour/visibility transition that propagates outward
       from the player along passages (see setViz / currentModeK).
   (3) state MUTATORS -- addXP / setViz funnel observable changes through one
       place so each can fire its trigger (shockwave on a new skill point, wave
       on a filter change). New mechanics should mutate via these, not raw `+=`.
   `now` is the shared per-frame clock, refreshed at the top of draw().
   Effect kinds are catalogued in [REF:effects] below. Invariant: this section
   is render-only -- effects and the wave never mutate game state; only the
   mutators (addXP / setViz) do.                                                */
            let now =
                typeof performance !== "undefined" ? performance.now() : 0;
            function currentTime() {
                return typeof performance !== "undefined"
                    ? performance.now()
                    : now;
            }
            function isSiteShown(s, t) {
                return s.inPatch && (t ?? currentTime()) >= (s.revealAt || 0);
            }

            const effects = [];
            function addEffect(e) {
                e.t0 = now;
                effects.push(e);
                return e;
            }
            function easeOut(t) {
                return 1 - (1 - t) * (1 - t);
            }
            function easeInOut(t) {
                return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            }

            // screen-space centre of a fixed UI button (null if it is hidden / unmounted)
            function btnCenter(id) {
                const el = document.getElementById(id);
                if (!el) return null;
                const r = el.getBoundingClientRect();
                if (r.width === 0 && r.height === 0) return null;
                return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
            }
            const SKILL_BTN_FALLBACK = { x: 92, y: 67 }; // fallback for xpBar shock ring (left side)

            /* [REF:effects]  one-off visuals pushed via addEffect(); each needs a case here.
   kind         fields (besides t0/dur)          drawn as
   shock        target (element id), delay        expanding ring on a UI element
   crystalFly   world {x,y}, targetId             diamond arcing to heat bar or xp bar
   sitePulse    world {x,y}, color                expanding world-space ring on a site
   claimFly     world {x,y}, depth                circle (r=2*depth) arcing to xp bar
   xpFly        world {x,y}, radius               hollow circle from xpBar to star (xp at risk)
   xpReturn     world {x,y}, radius               filled circle from star to xpBar (xp restored)
   Keep effects purely visual -- never mutate game state from drawEffect().      */
            function drawEffect(e, t) {
                switch (e.kind) {
                    case "shock": {
                        // expanding ring on the Skills button
                        const c =
                            e.center ||
                            (e.center =
                                btnCenter(e.target) || SKILL_BTN_FALLBACK);
                        const tt = easeOut(t);
                        const rad = 10 + tt * 44;
                        ctx.save();
                        ctx.strokeStyle = "#9af0e6";
                        ctx.globalAlpha = (1 - t) * 0.9;
                        ctx.lineWidth = Math.max(1, 3 * (1 - t) + 1);
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, rad, 0, 7);
                        ctx.stroke();
                        ctx.globalAlpha = (1 - t) * 0.45;
                        ctx.beginPath();
                        ctx.arc(c.x, c.y, rad * 0.6, 0, 7);
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                    case "crystalFly": {
                        // diamond arcs from a site up to the heat bar or xp bar
                        const start = worldToScreen(e.world);
                        const bar = document
                            .getElementById(e.targetId || "heatBar")
                            .getBoundingClientRect();
                        const end = {
                            x: bar.left + bar.width / 2,
                            y: bar.top + bar.height / 2,
                        };
                        const ctrl = {
                            x: (start.x + end.x) / 2,
                            y: Math.min(start.y, end.y) - 70,
                        };
                        const tt = easeInOut(t),
                            u = 1 - tt;
                        const x =
                            u * u * start.x +
                            2 * u * tt * ctrl.x +
                            tt * tt * end.x;
                        const y =
                            u * u * start.y +
                            2 * u * tt * ctrl.y +
                            tt * tt * end.y;
                        const sz = Math.max(
                            3,
                            cam.scale * 0.3 * (1 - 0.55 * tt),
                        );
                        ctx.save();
                        ctx.globalAlpha = (1 - tt) * 0.3;
                        ctx.fillStyle = "#b9f2ff";
                        ctx.beginPath();
                        ctx.arc(x, y, sz * 1.7, 0, 7);
                        ctx.fill(); // soft trail
                        ctx.globalAlpha = 1 - 0.2 * tt;
                        ctx.fillStyle = "#b9f2ff";
                        ctx.strokeStyle = "#4a90b8";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(x, y - sz);
                        ctx.lineTo(x + sz, y);
                        ctx.lineTo(x, y + sz);
                        ctx.lineTo(x - sz, y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                    case "sitePulse": {
                        const p = worldToScreen(e.world);
                        const tt = easeOut(t);
                        const inner = Math.max(4, cam.scale * 0.22);
                        const outer =
                            inner + tt * Math.max(16, cam.scale * 1.1);
                        ctx.save();
                        ctx.strokeStyle = e.color || "#ff584a";
                        ctx.globalAlpha = (1 - t) * 0.9;
                        ctx.lineWidth = Math.max(
                            1.5,
                            cam.scale * 0.08 * (1 - t) + 1,
                        );
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, outer, 0, 7);
                        ctx.stroke();
                        ctx.globalAlpha = (1 - t) * 0.32;
                        ctx.beginPath();
                        ctx.arc(
                            p.x,
                            p.y,
                            inner + tt * Math.max(8, cam.scale * 0.5),
                            0,
                            7,
                        );
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                    case "claimFly": {
                        // circle arcs from a claimed site up to the xp bar
                        const start = worldToScreen(e.world);
                        const bar = document
                            .getElementById("xpBar")
                            .getBoundingClientRect();
                        const end = {
                            x: bar.left + bar.width / 2,
                            y: bar.top + bar.height / 2,
                        };
                        const ctrl = {
                            x: (start.x + end.x) / 2,
                            y: Math.min(start.y, end.y) - 70,
                        };
                        const tt = easeInOut(t),
                            u = 1 - tt;
                        const x =
                            u * u * start.x +
                            2 * u * tt * ctrl.x +
                            tt * tt * end.x;
                        const y =
                            u * u * start.y +
                            2 * u * tt * ctrl.y +
                            tt * tt * end.y;
                        const radius = Math.max(
                            2,
                            2 * e.depth * (1 - 0.4 * tt),
                        );
                        ctx.save();
                        ctx.globalAlpha = 1 - t;
                        ctx.fillStyle = "#4ade80";
                        ctx.strokeStyle = "#166534";
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                    case "xpFly": {
                        // hollow circle flies from xpBar to the star (XP at risk)
                        const barEl = document
                            .getElementById("xpBar")
                            .getBoundingClientRect();
                        const start = {
                            x: barEl.left + barEl.width / 2,
                            y: barEl.top + barEl.height / 2,
                        };
                        const end = worldToScreen(e.world);
                        const ctrl = {
                            x: (start.x + end.x) / 2,
                            y: Math.min(start.y, end.y) - 80,
                        };
                        const tt = easeInOut(t),
                            u = 1 - tt;
                        const x =
                            u * u * start.x +
                            2 * u * tt * ctrl.x +
                            tt * tt * end.x;
                        const y =
                            u * u * start.y +
                            2 * u * tt * ctrl.y +
                            tt * tt * end.y;
                        ctx.save();
                        ctx.globalAlpha = 1 - 0.3 * t;
                        ctx.strokeStyle = "#4ade80";
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(x, y, Math.max(3, e.radius), 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                    case "xpReturn": {
                        // filled circle flies from star back to xpBar (XP restored)
                        const start = worldToScreen(e.world);
                        const barEl = document
                            .getElementById("xpBar")
                            .getBoundingClientRect();
                        const end = {
                            x: barEl.left + barEl.width / 2,
                            y: barEl.top + barEl.height / 2,
                        };
                        const ctrl = {
                            x: (start.x + end.x) / 2,
                            y: Math.min(start.y, end.y) - 80,
                        };
                        const tt = easeInOut(t),
                            u = 1 - tt;
                        const x =
                            u * u * start.x +
                            2 * u * tt * ctrl.x +
                            tt * tt * end.x;
                        const y =
                            u * u * start.y +
                            2 * u * tt * ctrl.y +
                            tt * tt * end.y;
                        ctx.save();
                        ctx.globalAlpha = 1 - 0.2 * t;
                        ctx.fillStyle = "#4ade80";
